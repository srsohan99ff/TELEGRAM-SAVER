<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Account History - Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f2f2f7;          
            --card: #ffffff;        
            --border: #e5e5ea;      
            --text: #000000;        
            --muted: #8e8e93;       
            --success: #34c759;     
            --danger: #ff3b30;    
            --primary: #007aff;     
            --font: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body { 
            background-color: var(--bg); 
            padding: 20px 14px; 
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .page-title {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        /* 🔍 সার্চ বক্স স্টাইল */
        .search-wrapper {
            display: flex;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            align-items: center;
        }
        
        .premium-search-icon {
            margin-left: 12px;
            margin-right: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            padding: 8px 10px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            background: transparent;
            user-select: text;
        }
        .search-input::placeholder { color: var(--muted); }
        
        .search-btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
            outline: none;
            height: 32px;
            padding: 0 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex; align-items: center; justify-content: center;
            min-width: 68px;
        }
        .search-btn:active { opacity: 0.8; }
        
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Loader Shimmer */
        .skeleton-card {
            background: var(--card); border-radius: 14px; padding: 16px;
            margin-bottom: 16px; border: 1px solid rgba(0, 0, 0, 0.03);
        }
        .skeleton-line {
            height: 14px; margin-bottom: 12px; border-radius: 6px;
            background: linear-gradient(90deg, #e5e5ea 25%, #f2f2f7 50%, #e5e5ea 75%);
            background-size: 200% 100%; animation: shimmer 1.4s infinite linear;
        }
        .skeleton-line.short { width: 35%; height: 12px; }
        .skeleton-line.long { width: 100%; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* iOS নোটিফিকেশন */
        #topNotification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #1c1c1e; border: 1px solid #2c2c2e; color: #ffffff; 
            padding: 10px 22px; border-radius: 50px; font-size: 13px; font-weight: 600;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2); z-index: 30000; 
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            display: flex; align-items: center; gap: 10px; white-space: nowrap; pointer-events: none;
        }
        #topNotification.show { top: 20px; }
        .toast-check { width: 18px; height: 18px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; color: #fff; }
        .toast-check svg { width: 11px; height: 11px; stroke: #fff; fill: none; stroke-width: 3; }

        /* কার্ড স্টাইল */
        .card { 
            background: var(--card); border-radius: 14px; overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.03); box-shadow: 0 2px 6px rgba(0,0,0,0.02); 
            margin-bottom: 16px; padding-top: 4px;
            animation: iosPop 0.3s cubic-bezier(0.1, 0.8, 0.25, 1);
        }
        
        .summary-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 14px; border-bottom: 1px solid #f2f2f7; gap: 10px;
        }
        
        .row-label { font-size: 13px; color: #48484a; font-weight: 700; white-space: nowrap; }
        .row-value-copy { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text); justify-content: flex-end; max-width: 75%; }
        .value-text { font-family: monospace; color: var(--text); word-break: break-all; text-align: right; user-select: text; }

        .inline-copy-btn {
            width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
            background: #ffffff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease; flex-shrink: 0;
        }
        .inline-copy-btn svg { width: 12px; height: 12px; fill: var(--muted); }
        .inline-copy-btn:active { transform: scale(0.88); background: #f2f2f7; }
        .inline-copy-btn.copied { background: var(--success) !important; border-color: var(--success) !important; }
        .inline-copy-btn.copied svg { fill: #fff !important; }

        /* অ্যাকশন বাটন প্যানেল */
        .card-actions {
            display: flex; justify-content: flex-end; gap: 6px;
            padding: 10px 14px; background: rgba(0,0,0,0.005);
            border-top: 1px solid #f2f2f7;
        }
        .action-btn {
            border: none; background: none; font-size: 13px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 4px;
            padding: 6px 10px; border-radius: 8px; transition: background 0.2s;
        }
        .action-btn.edit { color: var(--primary); }
        .action-btn.edit:active { background: rgba(0, 122, 255, 0.08); }
        .action-btn.edit svg { width: 13px; height: 13px; fill: var(--primary); }
        
        .action-btn.delete { color: var(--danger); }
        .action-btn.delete:active { background: rgba(255, 59, 48, 0.08); }
        .action-btn.delete svg { width: 13px; height: 13px; fill: var(--danger); }
        
        .message-box { text-align: center; color: var(--muted); font-weight: 600; padding: 40px 20px; font-size: 14px; line-height: 1.5; }

        .counter-container {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; color: var(--muted); font-weight: 600; margin-bottom: 16px; padding: 0 4px;
        }
        .counter-value {
            color: var(--primary); font-weight: 700; background: rgba(0, 122, 255, 0.1);
            padding: 3px 10px; border-radius: 20px; font-size: 13px;
        }

        /* iOS Overlay System */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); z-index: 20000;
            display: none; align-items: center; justify-content: center;
            padding: 16px;
        }
        .ios-alert-box {
            background: rgba(255, 255, 255, 0.96); width: 100%; max-width: 310px;
            border-radius: 14px; display: flex; flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.18); overflow: hidden;
            animation: iosPop 0.25s cubic-bezier(0.1, 0.8, 0.25, 1);
        }
        @keyframes iosPop {
            from { transform: scale(1.12); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .ios-alert-body { padding: 20px 16px 14px 16px; text-align: center; }
        .ios-alert-title { font-size: 17px; font-weight: 700; color: #000000; margin-bottom: 2px; }
        .ios-alert-subtitle { font-size: 13px; color: var(--primary); word-break: break-all; margin-bottom: 16px; font-weight: 600; font-family: monospace; }
        
        .ios-input-group { text-align: left; margin-bottom: 14px; }
        .ios-input-group label { 
            font-size: 12px; 
            font-weight: 700; 
            color: #48484a; 
            margin-left: 2px; 
            display: block; 
            margin-bottom: 5px; 
            letter-spacing: 0.2px; 
        }
        
        .input-card {
            width: 100%; background: #ffffff; border: 1px solid var(--border); border-radius: 10px;
            position: relative; display: flex; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.01);
            transition: all 0.2s ease;
        }
        .input-card.is-valid { border-color: var(--success) !important; box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.1) !important; }
        .input-card.is-invalid { border-color: var(--danger) !important; box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.1) !important; }

        .field-input { width: 100%; padding: 10px 12px; border: none; outline: none; font-size: 14px; font-weight: 500; color: var(--text); background: transparent; user-select: text !important; -webkit-user-select: text !important; }
        .field-input::placeholder { color: #c7c7cc; }

        .status-icon-wrap { display: flex; align-items: center; justify-content: center; padding-right: 10px; height: 100%; flex-shrink: 0; }
        .status-icon-wrap svg { width: 16px; height: 16px; display: none; }
        .input-card.is-valid .status-icon-wrap .tick-icon { display: block; fill: var(--success); }

        .ios-alert-buttons { display: flex; border-top: 0.5px solid #c8c8c8; }
        .ios-alert-btn {
            flex: 1; background: none; border: none; outline: none; padding: 12px;
            font-size: 16px; color: var(--primary); cursor: pointer; text-align: center;
        }
        .ios-alert-btn.cancel { border-right: 0.5px solid #c8c8c8; font-weight: 400; }
        .ios-alert-btn.save { font-weight: 600; }
        .ios-alert-btn:disabled { color: var(--muted) !important; opacity: 0.4; pointer-events: none; }
        .ios-alert-btn.danger-action { color: var(--danger) !important; font-weight: 700; }
        .ios-alert-btn:active { background: rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="topNotification">
        <div class="toast-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span id="notificationText">Copied Successfully!</span>
    </div>

    <div id="iosModalOverlay" class="modal-overlay">
        <div class="ios-alert-box">
            <div class="ios-alert-body">
                <div class="ios-alert-title">Edit Account</div>
                <div class="ios-alert-subtitle" id="modalTargetPhone">+8801XXXXXXX</div>
                
                <div class="ios-input-group">
                    <label>Your Email Address</label>
                    <div id="modalEmailCard" class="input-card">
                        <input type="text" id="modalEmailInput" class="field-input" placeholder="Enter New Email" oninput="checkModalEmailLive()">
                        <div class="status-icon-wrap">
                            <svg class="tick-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ios-alert-buttons">
                <button class="ios-alert-btn cancel" onclick="closeEditModal()">Cancel</button>
                <button class="ios-alert-btn save" id="modalSaveBtn" onclick="saveAccountEdits()">Save</button>
            </div>
        </div>
    </div>

    <div id="iosDeleteModalOverlay" class="modal-overlay">
        <div class="ios-alert-box">
            <div class="ios-alert-body" style="padding: 24px 16px 14px 16px;">
                <div class="ios-alert-title" style="font-size:18px; font-weight:800; color:var(--text)">Delete Account</div>
                <div class="ios-alert-subtitle" id="deleteTargetPhone" style="color:var(--primary); font-size:13px; font-weight:600; margin-top:4px; margin-bottom:8px;">+8801XXXXXXX</div>
                
                <div class="ios-input-group">
                    <label>Your Password</label>
                    <div id="modalDeletePasswordCard" class="input-card">
                        <input type="password" id="modalDeletePasswordInput" class="field-input" placeholder="Enter Password" oninput="checkDeletePasswordLive()">
                        <div class="status-icon-wrap">
                            <svg class="tick-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ios-alert-buttons">
                <button class="ios-alert-btn cancel" onclick="closeDeleteModal()" style="font-weight: 600;">Cancel</button>
                <button class="ios-alert-btn danger-action" id="modalDeleteBtn" onclick="confirmDeleteAccount()" disabled>Delete</button>
            </div>
        </div>
    </div>

    <h2 class="page-title">Account History</h2>

    <div class="search-wrapper">
        <div class="premium-search-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--muted)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>
        <input type="tel" id="searchInput" class="search-input" placeholder="Search by phone number..." onkeydown="if(event.key === 'Enter') handlePhoneSearch()">
        <button class="search-btn" onclick="handlePhoneSearch()">Search</button>
    </div>

    <div class="counter-container">
        <span>Accounts Found:</span>
        <span id="totalCount" class="counter-value">0</span>
    </div>

    <div id="historyBox">
        <div class="skeleton-card">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line long"></div>
            <div class="skeleton-line long"></div>
        </div>
        <div class="skeleton-card">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line long"></div>
            <div class="skeleton-line long"></div>
        </div>
    </div>

    <script>
        let allOrdersGlobal = [];
        let currentEditingPhone = null;
        let currentDeletingPhone = null;

        function triggerNotification(message, statusType = 'success') {
            const notif = document.getElementById('topNotification');
            const checkContainer = notif.querySelector('.toast-check');
            document.getElementById('notificationText').innerText = message;

            if(statusType === 'danger') {
                checkContainer.style.background = "var(--danger)";
                checkContainer.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
            } else {
                checkContainer.style.background = "var(--success)";
                checkContainer.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
            }

            notif.classList.add('show');
            setTimeout(() => { notif.classList.remove('show'); }, 2200);
        }

        function copyOrder(text, btnId) {
            if(!text || text === 'N/A') return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById(btnId);
                const icon = btn.querySelector('svg');
                
                btn.classList.add('copied');
                icon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#ffffff"/>';
                triggerNotification("Copied Successfully!", 'success');
                
                setTimeout(function() {
                    btn.classList.remove('copied');
                    icon.innerHTML = '<path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="#8e8e93"/>';
                }, 2200);
            });
        }

        function checkModalEmailLive() {
            const input = document.getElementById('modalEmailInput');
            const card = document.getElementById('modalEmailCard');
            const saveBtn = document.getElementById('modalSaveBtn');
            const val = input.value.trim().toLowerCase();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (val === "") {
                card.classList.remove('is-valid', 'is-invalid');
                saveBtn.disabled = true;
            } else if (emailRegex.test(val)) {
                card.classList.add('is-valid');
                card.classList.remove('is-invalid');
                saveBtn.disabled = false;
            } else {
                card.classList.remove('is-valid');
                card.classList.add('is-invalid');
                saveBtn.disabled = true;
            }
        }

        function checkDeletePasswordLive() {
            const input = document.getElementById('modalDeletePasswordInput');
            const card = document.getElementById('modalDeletePasswordCard');
            const deleteBtn = document.getElementById('modalDeleteBtn');
            const val = input.value;
            
            if (val === "") {
                card.classList.remove('is-valid', 'is-invalid');
                deleteBtn.disabled = true;
            } else if (val === "Srsohan99") {
                card.classList.add('is-valid');
                card.classList.remove('is-invalid');
                deleteBtn.disabled = false;
            } else {
                card.classList.remove('is-valid');
                card.classList.add('is-invalid');
                deleteBtn.disabled = true;
            }
        }

        /* 📱 ফোন নাম্বার দিয়ে এক্সট্রাক্ট ম্যাচিং সার্চ লজিক (Exact Match) */
        function handlePhoneSearch() {
            const searchBtn = document.querySelector('.search-btn');
            const originalText = searchBtn.innerText;
            
            searchBtn.innerHTML = '<div class="spinner"></div>';
            searchBtn.disabled = true;

            setTimeout(() => {
                const query = document.getElementById('searchInput').value.trim();
                if (query === "") {
                    renderOrders(allOrdersGlobal);
                } else {
                    const filtered = allOrdersGlobal.filter(item => {
                        let phoneVal = (item.phone || '').trim();
                        return phoneVal === query; // হুবহু মিলতে হবে (Exact match)
                    });
                    renderOrders(filtered);
                }
                searchBtn.innerHTML = originalText;
                searchBtn.disabled = false;
            }, 400); 
        }

        function openEditModal(targetPhone) {
            const account = allOrdersGlobal.find(item => (item.phone || '').trim() === targetPhone.trim());
            if (!account) return;

            currentEditingPhone = targetPhone.trim();
            document.getElementById('modalTargetPhone').innerText = currentEditingPhone;
            document.getElementById('modalEmailInput').value = account.email && account.email !== 'N/A' ? account.email : '';
            
            checkModalEmailLive();
            document.getElementById('iosModalOverlay').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('iosModalOverlay').style.display = 'none';
            currentEditingPhone = null;
        }

        function saveAccountEdits() {
            if (!currentEditingPhone) return;

            const newEmail = document.getElementById('modalEmailInput').value.trim().toLowerCase();

            allOrdersGlobal = allOrdersGlobal.map(item => {
                if ((item.phone || '').trim() === currentEditingPhone) {
                    return { ...item, email: newEmail || 'N/A' };
                }
                return item;
            });

            renderOrders(allOrdersGlobal);
            triggerNotification("Email Updated Successfully!", 'success');

            if (window.Telegram && window.Telegram.WebApp) {
                try {
                    window.Telegram.WebApp.sendData(JSON.stringify({
                        action: "edit_account",
                        phone: currentEditingPhone,
                        email: newEmail
                    }));
                } catch(tgErr) { console.log(tgErr); }
            }
            closeEditModal();
        }

        function executeDeleteAccount(targetPhone) {
            if (!targetPhone) return;
            currentDeletingPhone = targetPhone.trim();
            document.getElementById('deleteTargetPhone').innerText = currentDeletingPhone;
            
            const input = document.getElementById('modalDeletePasswordInput');
            const card = document.getElementById('modalDeletePasswordCard');
            const deleteBtn = document.getElementById('modalDeleteBtn');
            
            if (input) input.value = "";
            if (card) card.classList.remove('is-valid', 'is-invalid');
            if (deleteBtn) deleteBtn.disabled = true;
            
            document.getElementById('iosDeleteModalOverlay').style.display = 'flex';
        }

        function closeDeleteModal() {
            document.getElementById('iosDeleteModalOverlay').style.display = 'none';
            currentDeletingPhone = null;
            const input = document.getElementById('modalDeletePasswordInput');
            if (input) input.value = "";
        }

        function confirmDeleteAccount() {
            if (!currentDeletingPhone) return;

            allOrdersGlobal = allOrdersGlobal.filter(item => (item.phone || '').trim() !== currentDeletingPhone);
            renderOrders(allOrdersGlobal);
            triggerNotification("Account Deleted Successfully!", 'danger');

            if (window.Telegram && window.Telegram.WebApp) {
                try {
                    window.Telegram.WebApp.sendData(JSON.stringify({
                        action: "delete_account",
                        phone: currentDeletingPhone
                    }));
                } catch(tgErr) { console.log(tgErr); }
            }
            closeDeleteModal();
        }

        function renderOrders(ordersList) {
            const historyBox = document.getElementById('historyBox');
            
            if(!ordersList || !Array.isArray(ordersList) || ordersList.length === 0) {
                document.getElementById('totalCount').innerText = "0";
                historyBox.innerHTML = '<div class="message-box">No accounts found.</div>';
                return;
            }

            document.getElementById('totalCount').innerText = ordersList.length;

            historyBox.innerHTML = ordersList.map((item, index) => {
                let btnPhone = 'b-ph-' + index;
                let btnEmail = 'b-em-' + index;
                
                let phoneVal = (item.phone || 'N/A').trim();
                let emailVal = (item.email || 'N/A').trim();

                return `
                <div class="card">
                    <div class="summary-row">
                        <span class="row-label">Phone Number</span>
                        <div class="row-value-copy">
                            <span class="value-text">${phoneVal}</span>
                            <button class="inline-copy-btn" id="${btnPhone}" onclick="copyOrder('${phoneVal}', '${btnPhone}')">
                                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="summary-row">
                        <span class="row-label">Email Address</span>
                        <div class="row-value-copy">
                            <span class="value-text">${emailVal}</span>
                            <button class="inline-copy-btn" id="${btnEmail}" onclick="copyOrder('${emailVal}', '${btnEmail}')">
                                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="card-actions">
                        <button class="action-btn edit" onclick="openEditModal('${phoneVal}')">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                            Edit
                        </button>
                        <button class="action-btn delete" onclick="executeDeleteAccount('${phoneVal}')">
                            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                            Delete
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(() => {
                try {
                    const searchString = window.location.search || window.location.hash.replace('#', '?');
                    const urlParams = new URLSearchParams(searchString);
                    const historyData = urlParams.get('data') || urlParams.get('orders'); 

                    if (historyData && historyData.trim() !== "" && !historyData.startsWith("{")) {
                        const decodedData = decodeURIComponent(historyData);
                        allOrdersGlobal = JSON.parse(decodedData);
                        renderOrders(allOrdersGlobal);
                    } else {
                        renderOrders([]);
                    }
                } catch (error) {
                    console.error("JSON Parsing Error:", error);
                    document.getElementById('historyBox').innerHTML = '<div class="message-box" style="color:var(--danger)">❌ Invalid Data Format!</div>';
                }
            }, 1000);

            if (window.Telegram && window.Telegram.WebApp) {
                try {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                } catch(tgErr) { console.log(tgErr); }
            }
        });
    </script>
</body>
</html>
