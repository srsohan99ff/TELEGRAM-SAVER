<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram Account Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f2f7;          
            --card: #ffffff;        
            --border: #e5e5ea;      
            --text-dark: #1c1c1e;   
            --text-muted: #8e8e93;  
            --success: #34c759;     
            --danger: #ff3b30;
            --primary: #2481cc;     
            --font: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body { 
            background-color: var(--bg); 
            padding: 16px; 
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .top-nav-bar {
            width: 100%;
            height: 36px;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .back-circle-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: #fff;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
        }
        .back-circle-btn svg { width: 14px; height: 14px; fill: #48484a; }

        .brand-header {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
            margin-top: 4px;
        }
        h1.brand-title { 
            font-size: 24px; 
            font-weight: 700; 
            color: #000000; 
            letter-spacing: -0.3px;
        }

        .step-container { display: none; width: 100%; }
        .step-container.active { display: block; animation: stepFade 0.23s ease-out; }
        @keyframes stepFade { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }

        .section-label { font-size: 13px; font-weight: 500; color: var(--text-muted); text-align: left; margin-bottom: 8px; padding-left: 2px; }
        
        .input-card {
            width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            position: relative; display: flex; align-items: center; margin-bottom: 20px; overflow: hidden;
        }
        .input-card.is-valid { border-color: var(--success) !important; }
        .input-card.is-invalid { border-color: var(--danger) !important; }

        .custom-select-trigger {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            color: #1c1c1e;
            background: transparent;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .custom-select-trigger.placeholder .trigger-content {
            color: #bcbcc1;
        }
        .trigger-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: calc(100% - 16px);
            padding-right: 4px;
        }
        .arrow-icon {
            width: 10px;
            height: 10px;
            fill: none;
            stroke: #8e8e93;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .phone-input-row {
            display: flex;
            width: 100%;
            align-items: center;
        }
        .code-container {
            width: 75px;
            display: flex;
            align-items: center;
            border-right: 1px solid var(--border);
            padding-left: 14px;
        }
        .code-plus { font-size: 14px; color: #000; margin-right: 2px; }
        .code-field {
            width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 14px 0;
        }
        .field-input { width: 100%; padding: 14px; border: none; outline: none; font-size: 14px; font-weight: 400; color: #000; background: transparent; }
        .field-input::placeholder { color: #bcbcc1; }

        .status-icon-wrap { display: flex; align-items: center; justify-content: center; padding-right: 14px; height: 100%; flex-shrink: 0; }
        .status-icon-wrap svg { width: 18px; height: 18px; display: none; }
        .input-card.is-valid .status-icon-wrap .tick-icon { display: block; fill: var(--success); }

        /* FULL SCREEN COUNTRY PICKER OVERLAY */
        .ios-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 20000;
            display: none;
        }
        .ios-modal-overlay.show { display: block; }
        
        .ios-bottom-sheet {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            padding: 16px;
        }

        .ios-modal-header {
            display: flex; align-items: center;
            height: 40px; margin-bottom: 12px; position: relative;
        }
        .modal-back-btn {
            width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid var(--border); background: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .modal-back-btn svg { width: 14px; height: 14px; fill: #48484a; }
        
        .ios-modal-title { 
            position: absolute; left: 50%; transform: translateX(-50%);
            font-size: 18px; font-weight: 700; color: #000; 
        }

        .ios-search-box {
            margin-bottom: 14px;
        }
        .search-input-wrapper {
            width: 100%; background: #ffffff;
            border-radius: 10px; border: 1px solid var(--border); 
            display: flex; align-items: center; padding-left: 12px;
        }
        .premium-search-icon {
            width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        .premium-search-icon svg {
            width: 100%; height: 100%; fill: none; stroke: var(--primary); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }
        .search-field {
            width: 100%; padding: 12px 10px; border: none; outline: none; font-size: 14.5px; background: transparent; color: #000;
        }
        .search-field::placeholder { color: #bcbcc1; }

        .ios-list-content {
            overflow-y: auto; flex-grow: 1; background: #ffffff; border-radius: 10px; border: 1px solid var(--border);
        }
        .ios-country-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 16px; font-size: 15px; color: #000;
            border-bottom: 1px solid #f2f2f7; cursor: pointer; transition: background 0.1s;
        }
        .ios-country-item:last-child { border-bottom: none; }
        .ios-country-item:active { background: #f2f2f7; }
        .item-name { font-weight: 400; }
        .item-code { color: var(--text-muted); font-weight: 500; }

        .proceed-btn {
            width: 100%; padding: 14px; background: #d1d1d6; color: #8e8e93; border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
            cursor: not-allowed; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; gap: 6px;
        }
        .proceed-btn.active { background: var(--primary) !important; color: #fff !important; cursor: pointer !important; }
        .btn-spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.5s linear infinite; }

        .summary-card { 
            background: var(--card); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; width: 100%;
        }
        .summary-row { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #f2f2f7; }
        .summary-row:last-child { border-bottom: none; }
        .row-label-normal { width: 110px; font-size: 14px; color: #2c2c2e; font-weight: 500; flex-shrink: 0; }
        .row-value { font-size: 13.5px; font-weight: 400; color: #1c1c1e; flex-grow: 1; padding-left: 10px; word-break: break-all; }

        #successOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.25); backdrop-filter: blur(6px); z-index: 9999; justify-content: center; align-items: center;
        }
        .success-card { background: #ffffff; border-radius: 20px; padding: 30px; width: 80%; max-width: 300px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .success-circle { width: 64px; height: 64px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; margin-bottom: 16px;}
        .tick-svg { width: 32px; height: 32px; stroke: #fff; fill: none; stroke-width: 3.5; }
        .success-heading { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 6px; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav-bar">
        <button id="backArrowBtn" class="back-circle-btn" onclick="handleBack()">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
    </div>

    <div class="brand-header" id="brandHeader">
        <h1 class="brand-title">Telegram Account</h1>
    </div>

    <div id="stepPhone" class="step-container active">
        <div class="section-label">Select Country</div>
        <div class="input-card" id="countryCard">
            <div class="custom-select-trigger placeholder" id="selectTrigger" onclick="openCountryModal()">

                    <span class="item-name">Select Country</span>
                    <span class="item-code"></span>
                </div>
                <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </div>
        </div>

        <div class="section-label">Phone Number</div>
        <div id="phoneCard" class="input-card">
            <div class="phone-input-row">
                <div class="code-container">
                    <span class="code-plus">+</span>
                    <input type="tel" id="codeField" class="code-field" placeholder="Code" oninput="onCodeFieldChange()">
                </div>
                <input type="tel" id="phoneField" class="field-input" placeholder="Enter Phone Number" oninput="checkPhoneLive()">
            </div>
            <div class="status-icon-wrap">
                <svg class="tick-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
        </div>
        
        <button id="phoneProceedBtn" class="proceed-btn" onclick="goToStep('Email')" disabled>
            <div id="phoneSpinner" class="btn-spinner"></div>
            <span id="phoneBtnText">Proceed</span>
        </button>
    </div>

    <div id="stepEmail" class="step-container">
        <div class="section-label">Your Email Address</div>
        <div id="emailCard" class="input-card">
            <input type="email" id="emailInput" class="field-input" placeholder="Enter Email Address" oninput="checkEmailLive()">
            <div class="status-icon-wrap">
                <svg class="tick-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
        </div>
        <button id="emailProceedBtn" class="proceed-btn" onclick="goToStep('Summary')" disabled>
            <div id="emailSpinner" class="btn-spinner"></div>
            <span id="emailBtnText">Proceed</span>
        </button>
    </div>

    <div id="stepSummary" class="step-container">
        <div class="section-label">Account Confirmation Summary</div>
        <div class="summary-card">
            <div class="summary-row">
                <span class="row-label-normal">Phone Number</span>
                <span class="row-value" id="sumPhone">-</span>
            </div>
            <div class="summary-row">
                <span class="row-label-normal">Email Address</span>
                <span class="row-value" id="sumEmail">-</span>
            </div>
        </div>
        <button id="submitBtn" class="proceed-btn active" style="background:var(--primary) !important;" onclick="submitFinalData()">
            <div id="submitSpinner" class="btn-spinner"></div>
            <span id="submitBtnText">Confirm & Submit</span>
        </button>
    </div>
</div>

<div class="ios-modal-overlay" id="countryModal">
    <div class="ios-bottom-sheet">
        <div class="ios-modal-header">
            <button class="modal-back-btn" onclick="closeCountryModal()">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <span class="ios-modal-title">Select Country</span>
        </div>
        
        <div class="ios-search-box">
            <div class="search-input-wrapper">
                <div class="premium-search-icon">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input type="text" id="searchField" class="search-field" placeholder="Search country code or name..." oninput="filterCountries()">
            </div>
        </div>
        
        <div class="ios-list-content" id="countryListContainer"></div>
    </div>
</div>

<div id="successOverlay">
    <div class="success-card">
        <div class="success-circle">
            <svg class="tick-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="success-heading">Synchronized!</div>
    </div>
</div>

    let currentExpectedLength = 10; 
    let collectedFormData = { phone: "", email: "" }; 
    let currentStepName = "Phone";

    function loadCountryList(data) {
        const container = document.getElementById('countryListContainer');
        container.innerHTML = '';
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'ios-country-item';
            div.onclick = () => selectCountryItem(item);
            div.innerHTML = `
                <span class="item-name">${item.flag} ${item.name}</span>
                <span class="item-code">+${item.code}</span>
            `;
            container.appendChild(div);
        });
    }

    function openCountryModal() {
        document.getElementById('searchField').value = '';
        loadCountryList(countryDatabase);
        const modal = document.getElementById('countryModal');
        modal.classList.add('show');
    }

    function closeCountryModal() {
        const modal = document.getElementById('countryModal');
        modal.classList.remove('show');
    }

    function selectCountryItem(item) {
        const trigger = document.getElementById('selectTrigger');
        trigger.classList.remove('placeholder');
        
        document.getElementById('selectedCountryText').innerHTML = `
            <span class="item-name">${item.flag} ${item.name}</span>
            <span class="item-code" style="color: var(--text-muted); font-weight:500;">+${item.code}</span>
        `;
        document.getElementById('codeField').value = item.code;
        currentExpectedLength = item.digits; 
        
        closeCountryModal();
        checkPhoneLive();
    }

    function filterCountries() {
        const query = document.getElementById('searchField').value.toLowerCase().trim();
        const filtered = countryDatabase.filter(item => 
            item.name.toLowerCase().includes(query) || item.code.includes(query)
        );
        loadCountryList(filtered);
    }

    function onCodeFieldChange() {
        let codeVal = document.getElementById('codeField').value.trim().replace(/[^0-9]/g, '');
        document.getElementById('codeField').value = codeVal;

        const match = countryDatabase.find(item => item.code === codeVal);
        const trigger = document.getElementById('selectTrigger');
        
        if (match) {
            trigger.classList.remove('placeholder');
            document.getElementById('selectedCountryText').innerHTML = `
                <span class="item-name">${match.flag} ${match.name}</span>
                <span class="item-code" style="color: var(--text-muted); font-weight:500;">+${match.code}</span>
            `;
            currentExpectedLength = match.digits;
        } else {
            trigger.classList.add('placeholder');
            document.getElementById('selectedCountryText').innerHTML = `
                <span class="item-name">Select Country</span>
                <span class="item-code"></span>
            `;
            currentExpectedLength = 10; 
        }
        checkPhoneLive();
    }

    function checkPhoneLive() {
        const code = document.getElementById('codeField').value.trim();
        let phone = document.getElementById('phoneField').value.trim().replace(/[^0-9]/g, '');
        document.getElementById('phoneField').value = phone;

        if (phone.startsWith('0')) {
            phone = phone.substring(1);
        }

        const card = document.getElementById('phoneCard');
        const btn = document.getElementById('phoneProceedBtn');

        if (code.length > 0 && phone.length === currentExpectedLength) { 
            card.className = "input-card is-valid"; 
            btn.removeAttribute('disabled'); 
            btn.classList.add('active'); 
        } else if(phone.length === 0) { 
            card.className = "input-card"; 
            btn.setAttribute('disabled','true'); 
            btn.classList.remove('active'); 
        } else { 
            card.className = "input-card is-invalid"; 
            btn.setAttribute('disabled','true'); 
            btn.classList.remove('active'); 
        }
    }

    function checkEmailLive() {
        const val = document.getElementById('emailInput').value.trim();
        const card = document.getElementById('emailCard');
        const btn = document.getElementById('emailProceedBtn');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (emailRegex.test(val) && val.length >= 5) { 
            card.className = "input-card is-valid"; 
            btn.removeAttribute('disabled'); 
            btn.classList.add('active'); 
        } else if(val.length === 0) { 
            card.className = "input-card"; 
            btn.setAttribute('disabled','true'); 
            btn.classList.remove('active'); 
        } else { 
            card.className = "input-card is-invalid"; 
            btn.setAttribute('disabled','true'); 
            btn.classList.remove('active'); 
        }
    }

    function goToStep(nextStep) {
        let currentLower = currentStepName.toLowerCase();
        document.getElementById(currentLower + 'Spinner').style.display = 'block';
        document.getElementById(currentLower + 'BtnText').style.display = 'none';

        setTimeout(() => {
            if (currentStepName === "Phone") {
                let p = document.getElementById('phoneField').value.trim();
                if(p.startsWith('0')) p = p.substring(1);
                collectedFormData.phone = "+" + document.getElementById('codeField').value.trim() + p;
            }
            if (currentStepName === "Email") {
                collectedFormData.email = document.getElementById('emailInput').value.trim();
            }

            document.getElementById('step' + currentStepName).style.display = 'none';
            document.getElementById('step' + nextStep).style.display = 'block';
            document.getElementById('backArrowBtn').style.display = 'flex';
            
            currentStepName = nextStep;

            if (nextStep === "Summary") {
                document.getElementById('brandHeader').style.display = 'none';
                document.getElementById('sumPhone').innerText = collectedFormData.phone;
                document.getElementById('sumEmail').innerText = collectedFormData.email;
            }
            resetSpinner(currentLower);
        }, 400);
    }

    function handleBack() {
        document.getElementById('brandHeader').style.display = 'flex';
        if (currentStepName === "Summary") {
            document.getElementById('stepSummary').style.display = 'none';
            document.getElementById('stepEmail').style.display = 'block';
            currentStepName = "Email";
        } else if (currentStepName === "Email") {
            document.getElementById('stepEmail').style.display = 'none';
            document.getElementById('stepPhone').style.display = 'block';
            document.getElementById('backArrowBtn').style.display = 'none';
            currentStepName = "Phone";
        }
    }

    function resetSpinner(prefix) {
        document.getElementById(prefix + 'Spinner').style.display = 'none';
        document.getElementById(prefix + 'BtnText').style.display = 'block';
    }

    function submitFinalData() {
        document.getElementById('submitSpinner').style.display = 'block';
        document.getElementById('submitBtnText').style.display = 'none';
        document.getElementById('successOverlay').style.display = 'flex';

        setTimeout(() => {
            tg.sendData(JSON.stringify(collectedFormData));
            setTimeout(() => { tg.close(); }, 1000);
        }, 2000);
    }

    window.onload = () => { loadCountryList(countryDatabase); };
