<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram Account Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f2f7;          
            --card: #ffffff;        
            --border: #e5e5ea;      
            --text-dark: #1c1c1e;   
            --text-muted: #8e8e93;  
            --success: #34c759;     
            --danger: #ff3b30;
            --primary: #2481cc;     /* Telegram Blue */
            --font: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body { 
            background-color: var(--bg); 
            padding: 16px; 
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .top-nav-bar {
            width: 100%;
            height: 36px;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .back-circle-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: #fff;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
        }
        .back-circle-btn svg { width: 14px; height: 14px; fill: #48484a; }

        .brand-header {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
            margin-top: 4px;
        }
        h1.brand-title { 
            font-size: 24px; 
            font-weight: 700; 
            color: #000000; 
            letter-spacing: -0.3px;
        }

        .step-container { display: none; width: 100%; }
        .step-container.active { display: block; animation: stepFade 0.23s ease-out; }
        @keyframes stepFade { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }

        .section-label { font-size: 13px; font-weight: 500; color: var(--text-muted); text-align: left; margin-bottom: 8px; padding-left: 2px; }
        
        /* Premium Card UI Elements */
        .input-card {
            width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            position: relative; display: flex; align-items: center; margin-bottom: 20px; overflow: hidden;
        }
        .input-card.is-valid { border-color: var(--success) !important; }
        .input-card.is-invalid { border-color: var(--danger) !important; }

        .select-wrapper {
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
        }
        .select-wrapper::after {
            content: '';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            border: 5px solid transparent;
            border-top-color: #8e8e93;
            pointer-events: none;
        }

        .tg-select {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            border: none;
            outline: none;
            background: transparent;
            appearance: none;
            -webkit-appearance: none;
            color: #000;
            cursor: pointer;
        }

        .phone-input-row {
            display: flex;
            width: 100%;
            align-items: center;
        }

        .code-container {
            width: 75px;
            display: flex;
            align-items: center;
            border-right: 1px solid var(--border);
            padding-left: 14px;
        }
        .code-plus {
            font-size: 14px;
            color: #000;
            margin-right: 2px;
        }
        .code-field {
            width: 100%;
            border: none;
            outline: none;
            font-size: 14px;
            background: transparent;
            padding: 14px 0;
        }

        .field-input { width: 100%; padding: 14px; border: none; outline: none; font-size: 14px; font-weight: 400; color: #000; background: transparent; }
        .field-input::placeholder { color: #bcbcc1; }

        .status-icon-wrap { display: flex; align-items: center; justify-content: center; padding-right: 14px; height: 100%; flex-shrink: 0; }
        .status-icon-wrap svg { width: 18px; height: 18px; display: none; }
        .input-card.is-valid .status-icon-wrap .tick-icon { display: block; fill: var(--success); }

        .proceed-btn {
            width: 100%; padding: 14px; background: #d1d1d6; color: #8e8e93; border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
            cursor: not-allowed; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; gap: 6px;
        }
        .proceed-btn.active { background: var(--primary) !important; color: #fff !important; cursor: pointer !important; }
        
        .btn-spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.5s linear infinite; }

        /* SUMMARY CONTAINER CONFIGURATION */
        .summary-card { 
            background: var(--card); border-radius: 14px; overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 20px; padding: 0;
            width: 100%;
        }
        
        .summary-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 14px 16px; 
            border-bottom: 1px solid #f2f2f7;
            background: var(--card);
        }
        .summary-row:last-child { border-bottom: none; }
        
        .row-label-normal { 
            width: 110px;
            font-size: 14px; 
            color: #2c2c2e; 
            font-weight: 500; 
            flex-shrink: 0;
        }

        .row-value { 
            font-size: 13.5px; 
            font-weight: 400; 
            color: #1c1c1e; 
            text-align: left;
            flex-grow: 1;
            word-break: break-all;
            padding-left: 10px;
        }

        #successOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.25); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .success-card {
            background: #ffffff; border-radius: 20px; padding: 30px; width: 80%; max-width: 300px;
            display: flex; flex-direction: column; align-items: center; box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }
        .success-circle { width: 64px; height: 64px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; margin-bottom: 16px;}
        .tick-svg { width: 32px; height: 32px; stroke: #fff; fill: none; stroke-width: 3.5; }
        .success-heading { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 6px; }
        .success-sub { font-size: 13px; font-weight: 500; color: var(--text-muted); text-align: center; line-height: 1.4; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav-bar">
        <button id="backArrowBtn" class="back-circle-btn" onclick="handleBack()">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
    </div>

    <div class="brand-header" id="brandHeader">
        <h1 class="brand-title">Telegram Account</h1>
    </div>

    <!-- STEP 1: PHONE & COUNTRY SELECTION -->
    <div id="stepPhone" class="step-container active">
        <div class="section-label">Select Country</div>
        <div class="input-card">
            <div class="select-wrapper">
                <select id="countrySelect" class="tg-select" onchange="onCountryDropdownChange()">
                    <option value="" disabled selected>Select Country</option>
                    <option value="BD" data-code="880">🇧🇩 Bangladesh (+880)</option>
                    <option value="US" data-code="1">🇺🇸 United States (+1)</option>
                    <option value="GB" data-code="44">🇬🇧 United Kingdom (+44)</option>
                    <option value="IN" data-code="91">🇮🇳 India (+91)</option>
                    <option value="PK" data-code="92">🇵🇰 Pakistan (+92)</option>
                    <option value="SA" data-code="966">🇸🇦 Saudi Arabia (+966)</option>
                    <option value="AE" data-code="971">🇦🇪 UAE (+971)</option>
                </select>
            </div>
        </div>

        <div class="section-label">Phone Number</div>
        <div id="phoneCard" class="input-card">
            <div class="phone-input-row">
                <div class="code-container">
                    <span class="code-plus">+</span>
                    <input type="tel" id="codeField" class="code-field" placeholder="Code" oninput="onCodeFieldChange()">
                </div>
                <input type="tel" id="phoneField" class="field-input" placeholder="Enter Phone Number" oninput="checkPhoneLive()">
            </div>
            <div class="status-icon-wrap">
                <svg class="tick-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
        </div>
        
        <button id="phoneProceedBtn" class="proceed-btn" onclick="goToStep('Email')" disabled>
            <div id="phoneSpinner" class="btn-spinner"></div>
            <span id="phoneBtnText">Proceed</span>
        </button>
    </div>

    <!-- STEP 2: EMAIL ADDRESS -->
    <div id="stepEmail" class="step-container">
        <div class="section-label">Your Email Address</div>
        <div id="emailCard" class="input-card">
            <input type="email" id="emailInput" class="field-input" placeholder="Enter Email Address" oninput="checkEmailLive()">
            <div class="status-icon-wrap">
                <svg class="tick-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
        </div>
        <button id="emailProceedBtn" class="proceed-btn" onclick="goToStep('Summary')" disabled>
            <div id="emailSpinner" class="btn-spinner"></div>
            <span id="emailBtnText">Proceed</span>
        </button>
    </div>

    <!-- STEP 3: SUMMARY SCREEN -->
    <div id="stepSummary" class="step-container">
        <div class="section-label">Account Confirmation Summary</div>
        <div class="summary-card">
            <div class="summary-row">
                <span class="row-label-normal">Country</span>
                <span class="row-value" id="sumCountry">-</span>
            </div>
            <div class="summary-row">
                <span class="row-label-normal">Phone Number</span>
                <span class="row-value" id="sumPhone">-</span>
            </div>
            <div class="summary-row">
                <span class="row-label-normal">Email Address</span>
                <span class="row-value" id="sumEmail">-</span>
            </div>
        </div>

        <button id="submitBtn" class="proceed-btn active" style="background:var(--primary) !important;" onclick="submitFinalData()">
            <div id="submitSpinner" class="btn-spinner"></div>
            <span id="submitBtnText">Confirm & Submit</span>
        </button>
    </div>
</div>

<div id="successOverlay">
    <div class="success-card">
        <div class="success-circle">
            <svg class="tick-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="success-heading">Synchronized!</div>
        <div class="success-sub">Telegram data submitted successfully. This window will close shortly.</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let collectedFormData = { country: "", countryCode: "", phone: "", email: "" };
    let currentStepName = "Phone";

    // দেশ পরিবর্তন হলে অটোমেটিক কোড বসে যাবে
    function onCountryDropdownChange() {
        const select = document.getElementById('countrySelect');
        if(select.selectedIndex === 0) return;
        
        const selectedOption = select.options[select.selectedIndex];
        const code = selectedOption.getAttribute('data-code');
        
        document.getElementById('codeField').value = code;
        collectedFormData.country = selectedOption.text.split(' (')[0]; // ইমোজি ও দেশের নাম শুধু ফিল্টার করবে
        checkPhoneLive();
    }

    // কোড বক্সে টাইপ করলে ড্রপডাউন সিলেক্ট হয়ে যাবে
    function onCodeFieldChange() {
        let codeVal = document.getElementById('codeField').value.trim().replace(/[^0-9]/g, '');
        document.getElementById('codeField').value = codeVal;

        const select = document.getElementById('countrySelect');
        let matched = false;

        for (let i = 1; i < select.options.length; i++) {
            if (select.options[i].getAttribute('data-code') === codeVal) {
                select.selectedIndex = i;
                collectedFormData.country = select.options[i].text.split(' (')[0];
                matched = true;
                break;
            }
        }

        if (!matched) {
            select.selectedIndex = 0; // মিল না পেলে 'Select Country' করে দেবে
            collectedFormData.country = "Unknown Country";
        }
        checkPhoneLive();
    }

    // লাইভ ফোন নাম্বার এবং লাইভ টিক-মার্ক চেকার (আগের মতো আইওএস স্টাইল)
    function checkPhoneLive() {
        const code = document.getElementById('codeField').value.trim();
        const phone = document.getElementById('phoneField').value.trim();
        const card = document.getElementById('phoneCard');
        const btn = document.getElementById('phoneProceedBtn');

        if (code.length > 0 && phone.length >= 6) { 
            card.className = "input-card is-valid"; 
            btn.removeAttribute('disabled'); 
            btn.classList.add('active'); 
        }
        else if(phone.length === 0) { 
            card.className = "input-card"; 
            btn.setAttribute('disabled','true'); 
            btn.classList.remove('active'); 
        }
        else { 
            card.className = "input-card is-invalid"; 
            btn.setAttribute('disabled','true'); 
            btn.classList.remove('active'); 
        }
    }

    // লাইভ ইমেইল ভ্যালিডেশন চেকার
    function checkEmailLive() {
        const val = document.getElementById('emailInput').value.trim();
        const card = document.getElementById('emailCard');
        const btn = document.getElementById('emailProceedBtn');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (emailRegex.test(val) && val.length >= 5) { 
            card.className = "input-card is-valid"; 
            btn.removeAttribute('disabled'); 
            btn.classList.add('active'); 
        }
        else if(val.length === 0) { 
            card.className = "input-card"; 
            btn.setAttribute('disabled','true'); 
            btn.classList.remove('active'); 
        }
        else { 
            card.className = "input-card is-invalid"; 
            btn.setAttribute('disabled','true'); 
            btn.classList.remove('active'); 
        }
    }

    function goToStep(nextStep) {
        let currentLower = currentStepName.toLowerCase();
        document.getElementById(currentLower + 'Spinner').style.display = 'block';
        document.getElementById(currentLower + 'BtnText').style.display = 'none';
        document.getElementById(currentLower + 'ProceedBtn').setAttribute('disabled','true');

        setTimeout(() => {
            if (currentStepName === "Phone") {
                collectedFormData.countryCode = "+" + document.getElementById('codeField').value.trim();
                collectedFormData.phone = document.getElementById('phoneField').value.trim();
            }
            if (currentStepName === "Email") {
                collectedFormData.email = document.getElementById('emailInput').value.trim();
            }

            document.getElementById('step' + currentStepName).style.display = 'none';
            document.getElementById('step' + nextStep).style.display = 'block';
            document.getElementById('backArrowBtn').style.display = 'flex';
            
            currentStepName = nextStep;

            if (nextStep === "Summary") {
                document.getElementById('brandHeader').style.display = 'none';
                document.getElementById('sumCountry').innerText = collectedFormData.country || "Not Selected";
                document.getElementById('sumPhone').innerText = collectedFormData.countryCode + " " + collectedFormData.phone;
                document.getElementById('sumEmail').innerText = collectedFormData.email;
            }
        }, 400);
    }

    function handleBack() {
        document.getElementById('brandHeader').style.display = 'flex';
        
        if (currentStepName === "Summary") {
            document.getElementById('stepSummary').style.display = 'none';
            document.getElementById('stepEmail').style.display = 'block';
            resetSpinner('email'); currentStepName = "Email";
        } else if (currentStepName === "Email") {
            document.getElementById('stepEmail').style.display = 'none';
            document.getElementById('stepPhone').style.display = 'block';
            document.getElementById('backArrowBtn').style.display = 'none';
            resetSpinner('phone'); currentStepName = "Phone";
        }
    }

    function resetSpinner(prefix) {
        document.getElementById(prefix + 'Spinner').style.display = 'none';
        document.getElementById(prefix + 'BtnText').style.display = 'block';
        document.getElementById(prefix + 'ProceedBtn').removeAttribute('disabled');
        document.getElementById(prefix + 'ProceedBtn').classList.add('active');
    }

    function submitFinalData() {
        document.getElementById('submitSpinner').style.display = 'block';
        document.getElementById('submitBtnText').style.display = 'none';
        document.getElementById('submitBtn').setAttribute('disabled','true');
        document.getElementById('successOverlay').style.display = 'flex';

        setTimeout(() => {
            tg.sendData(JSON.stringify(collectedFormData));
            setTimeout(() => { tg.close(); }, 1000);
        }, 2000);
    }
</script>
</body>
</html>
