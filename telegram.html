<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram Account</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f2f7;          
            --card: #ffffff;        
            --border: #e5e5ea;      
            --text-dark: #1c1c1e;   
            --text-muted: #8e8e93;  
            --success: #34c759;     
            --danger: #ff3b30;
            --primary: #007aff;     
            --tg-cyan: #24a1de; /* অফিশিয়াল টেলিগ্রাম কালার */
            --font: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body { 
            background-color: var(--bg); 
            padding: 16px; 
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .top-nav-bar {
            width: 100%;
            height: 36px;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .back-circle-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: #fff;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
        }
        .back-circle-btn svg { width: 14px; height: 14px; fill: #48484a; }

        .brand-header {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
            margin-top: 4px;
        }
        h1.brand-title { 
            font-size: 24px; 
            font-weight: 700; 
            color: #000000; 
            letter-spacing: -0.3px;
        }

        .step-container { display: none; width: 100%; }
        .step-container.active { display: block; animation: stepFade 0.23s ease-out; }
        @keyframes stepFade { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }

        .section-label { font-size: 13px; font-weight: 500; color: var(--text-muted); text-align: left; margin-bottom: 8px; padding-left: 2px; }

        /* ========================================================
           📸 👑 SCREENSHOT DESIGN SYSTEM (COUNTRY & SPLIT INPUT)
           ======================================================== */
        
        /* কান্ট্রি সিলেক্টর বক্স */
        .country-card {
            width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 11px;
            position: relative; display: flex; align-items: center; margin-bottom: 22px;
        }
        .country-select {
            width: 100%; padding: 15px 16px; border: none; outline: none; font-size: 16px;
            font-weight: 500; color: var(--text-dark); background: transparent; appearance: none; -webkit-appearance: none;
            cursor: pointer;
        }
        .country-arrow-icon {
            position: absolute; right: 16px; pointer-events: none; width: 14px; height: 14px; fill: var(--text-muted);
        }

        /* স্প্লিট ফোন নম্বর ইনপুট গ্রুপ */
        .telegram-phone-group {
            position: relative; width: 100%; background: var(--card); border: 1px solid var(--border);
            border-radius: 11px; display: flex; align-items: center; margin-bottom: 24px; transition: border-color 0.2s ease;
        }
        .telegram-phone-group.focused { border-color: var(--tg-cyan) !important; }
        .telegram-phone-group.is-valid { border-color: var(--success) !important; }
        .telegram-phone-group.is-invalid { border-color: var(--danger) !important; }

        /* বর্ডারের ওপর বসা ফ্লোটিং লেবেল */
        .floating-label {
            position: absolute; top: -9px; left: 12px; background: var(--bg);
            padding: 0 5px; font-size: 12px; font-weight: 600; color: var(--tg-cyan); transition: color 0.2s;
        }
        .telegram-phone-group.is-invalid .floating-label { color: var(--danger); }
        .telegram-phone-group.is-valid .floating-label { color: var(--success); }

        .phone-static-plus {
            font-size: 16px; font-weight: 500; color: var(--text-dark); padding-left: 16px; user-select: none;
        }
        .cc-field-input {
            width: 45px; padding: 15px 4px; border: none; outline: none; font-size: 16px;
            font-weight: 500; color: var(--text-dark); background: transparent; text-align: left;
        }
        .split-vertical-line {
            width: 1px; height: 26px; background: var(--border); margin: 0 6px 0 2px; flex-shrink: 0;
        }
        .main-number-input {
            flex-grow: 1; padding: 15px 4px; border: none; outline: none; font-size: 16px;
            font-weight: 500; color: var(--text-dark); background: transparent;
        }

        /* ইমেইল সিঙ্গেল ইনপুট বক্স */
        .input-card {
            width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 11px;
            position: relative; display: flex; align-items: center; margin-bottom: 24px; 
        }
        .input-card.is-valid { border-color: var(--success) !important; }
        .input-card.is-invalid { border-color: var(--danger) !important; }
        .field-input { width: 100%; padding: 15px 16px; border: none; outline: none; font-size: 15px; font-weight: 500; color: #000; background: transparent; }

        .status-icon-wrap { display: flex; align-items: center; justify-content: center; padding-right: 14px; height: 100%; flex-shrink: 0; }
        .status-icon-wrap svg { width: 18px; height: 18px; display: none; }
        .telegram-phone-group.is-valid .status-icon-wrap .tick-icon,
        .input-card.is-valid .status-icon-wrap .tick-icon { display: block; fill: var(--success); }

        /* বোতাম ও প্রোগ্রেস */
        .proceed-btn {
            width: 100%; padding: 15px; background: #d1d1d6; color: #8e8e93; border: none; border-radius: 11px; font-size: 15px; font-weight: 600;
            cursor: not-allowed; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; gap: 6px;
        }
        .proceed-btn.active { background: var(--primary) !important; color: #fff !important; cursor: pointer !important; }
        .btn-spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.5s linear infinite; }

        /* ========================================================
           🍏 👑 SUMMARY CONTAINER CONFIGURATION (YOUR EXACT DESIGN)
           ======================================================== */
        .summary-card { 
            background: var(--card); border-radius: 14px; overflow: hidden;
            border: 1px solid var(--border); margin-bottom: 20px; padding: 0; width: 100%;
        }
        .summary-row {
            display: flex; align-items: center; justify-content: flex-start; padding: 14px 16px; 
            border-bottom: 1px solid #f2f2f7; background: var(--card);
        }
        .summary-row:last-child { border-bottom: none; }
        
        .row-label-normal { 
            width: 115px; font-size: 14px; color: #1c1c1e; font-weight: 700; flex-shrink: 0;
        }
        .row-value { 
            font-size: 13px; font-weight: 400; color: #8e8e93; text-align: left;
            flex-grow: 1; word-break: break-all; padding-left: 10px;
        }

        #successOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.25); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .success-card {
            background: #ffffff; border-radius: 20px; padding: 30px; width: 80%; max-width: 300px;
            display: flex; flex-direction: column; align-items: center; box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }
        .success-circle { width: 64px; height: 64px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; margin-bottom: 16px;}
        .tick-svg { width: 32px; height: 32px; stroke: #fff; fill: none; stroke-width: 3.5; }
        .success-heading { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 6px; }
        .success-sub { font-size: 13px; font-weight: 500; color: var(--text-muted); text-align: center; line-height: 1.4; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav-bar">
        <button id="backArrowBtn" class="back-circle-btn" onclick="handleBack()">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
    </div>

    <div class="brand-header" id="brandHeader">
        <h1 class="brand-title">Telegram Account</h1>
    </div>

    <!-- STEP 1: OFFICIAL COUNTRY & SPLIT PHONE NUMBER -->
    <div id="stepPhone" class="step-container active">
        <div class="section-label">Country</div>
        <div class="country-card">
            <select id="countrySelect" class="country-select" onchange="handleCountryChange()">
                <option value="">Choose Country</option>
                <option value="BD" selected>Bangladesh</option>
            </select>
            <svg class="country-arrow-icon" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </div>

        <div id="phoneGroupWrap" class="telegram-phone-group">
            <span class="floating-label">Phone number</span>
            <span class="phone-static-plus">+</span>
            <input type="tel" id="ccInput" class="cc-field-input" value="880" placeholder="Code" oninput="handleCcInput()" onfocus="toggleFocus(true)" onblur="toggleFocus(false)">
            <div class="split-vertical-line"></div>
            <input type="tel" id="mainNumberInput" class="main-number-input" placeholder="000 000 0000" oninput="checkPhoneLive()" onfocus="toggleFocus(true)" onblur="toggleFocus(false)">
            
            <div class="status-icon-wrap">
                <svg class="tick-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
        </div>

        <button id="phoneProceedBtn" class="proceed-btn active" onclick="goToStep('Email')">
            <div id="phoneSpinner" class="btn-spinner"></div>
            <span id="phoneBtnText">Proceed</span>
        </button>
    </div>

    <!-- STEP 2: EMAIL CHECKER -->
    <div id="stepEmail" class="step-container">
        <div class="section-label">Your Email Address</div>
        <div id="emailCard" class="input-card">
            <input type="email" id="emailInput" class="field-input" placeholder="Enter Email Address" oninput="checkEmailLive()">
            <div class="status-icon-wrap">
                <svg class="tick-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
        </div>
        <button id="emailProceedBtn" class="proceed-btn" onclick="goToStep('Summary')" disabled>
            <div id="emailSpinner" class="btn-spinner"></div>
            <span id="emailBtnText">Proceed</span>
        </button>
    </div>

    <!-- STEP 3: SUMMARY / CONFIRMATION PAGE -->
    <div id="stepSummary" class="step-container">
        <div class="section-label">Account Confirmation Summary</div>
        <div class="summary-card">
            <div class="summary-row">
                <span class="row-label-normal">Phone Number</span>
                <span class="row-value" id="sumPhone">-</span>
            </div>
            
            <div class="summary-row">
                <span class="row-label-normal">Email Address</span>
                <span class="row-value" id="sumEmail">-</span>
            </div>
        </div>

        <button id="submitBtn" class="proceed-btn active" style="background:var(--primary) !important;" onclick="submitFinalData()">
            <div id="submitSpinner" class="btn-spinner"></div>
            <span id="submitBtnText">Submit Account</span>
        </button>
    </div>
</div>

<!-- SUCCESS OVERLAY SCREEN -->
<div id="successOverlay">
    <div class="success-card">
        <div class="success-circle">
            <svg class="tick-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="success-heading">Synchronized!</div>
        <div class="success-sub">Account data submitted successfully. This window will close shortly.</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let collectedFormData = { email: "", gmail: "", phone: "" };
    let currentStepName = "Phone";

    function toggleFocus(isFocused) {
        const wrap = document.getElementById('phoneGroupWrap');
        if (isFocused) wrap.classList.add('focused');
        else wrap.classList.remove('focused');
    }

    // 🔄 ১. কান্ট্রি সিলেক্ট চেঞ্জ হলে কোড আপডেট
    function handleCountryChange() {
        const country = document.getElementById('countrySelect').value;
        const ccInput = document.getElementById('ccInput');
        if (country === "BD") {
            ccInput.value = "880";
        } else {
            ccInput.value = "";
        }
        checkPhoneLive();
    }

    // 🔄 ২. কোড ইনপুট চেঞ্জ হলে কান্ট্রি অটো-সিলেক্ট
    function handleCcInput() {
        const cc = document.getElementById('ccInput').value.trim();
        const countrySelect = document.getElementById('countrySelect');
        if (cc === "880") {
            countrySelect.value = "BD";
        } else {
            countrySelect.value = "";
        }
        checkPhoneLive();
    }

    // 🇧🇩 বাংলাদেশি ফোন নম্বর লাইভ চেকার ও ট্রিমার
    function checkPhoneLive() {
        const cc = document.getElementById('ccInput').value.trim();
        let mainNumField = document.getElementById('mainNumberInput');
        let mainNum = mainNumField.value.trim();
        const wrap = document.getElementById('phoneGroupWrap');
        const btn = document.getElementById('phoneProceedBtn');

        // ইউজার যদি ভুলে প্রথমে ০ (0) দেয়, ওটা অটো কেটে যাবে
        if (mainNum.startsWith('0')) {
            mainNum = mainNum.substring(1);
            mainNumField.value = mainNum;
        }

        if (cc === "880") {
            // বাংলাদেশ কোডে ফাস্ট ডিজিট ৩-৯ এবং মোট ১০ ডিজিট হবে (১ বাদ দিলে ৯ ডিজিট বা ১ সহ ১০ ডিজিট)
            // ১ থেকে শুরু হওয়া ১০ ডিজিটের নাম্বারঃ ১XXXXXXXXX
            const bdRegex = /^1[3-9]\d{8}$/;
            if (bdRegex.test(mainNum)) {
                wrap.className = "telegram-phone-group is-valid";
                btn.removeAttribute('disabled');
                btn.classList.add('active');
                return true;
            }
        }
        
        // নাম্বার ইনকমপ্লিট বা ভুল হলে
        if (mainNum.length === 0) {
            wrap.className = "telegram-phone-group";
        } else {
            wrap.className = "telegram-phone-group is-invalid";
        }
        btn.setAttribute('disabled', 'true');
        btn.classList.remove('active');
        return false;
    }

    // 📧 ইমেইল চেকার লাইভ লজিক
    function checkEmailLive() {
        const val = document.getElementById('emailInput').value.trim();
        const card = document.getElementById('emailCard');
        const btn = document.getElementById('emailProceedBtn');
        
        if (val.includes('@') && val.length >= 5 && val.lastIndexOf('.') > val.indexOf('@')) { 
            card.className = "input-card is-valid"; 
            btn.removeAttribute('disabled'); 
            btn.classList.add('active'); 
        }
        else if (val.length === 0) { 
            card.className = "input-card"; 
            btn.setAttribute('disabled', 'true'); 
            btn.classList.remove('active'); 
        }
        else { 
            card.className = "input-card is-invalid"; 
            btn.setAttribute('disabled', 'true'); 
            btn.classList.remove('active'); 
        }
    }

    // স্টেপ পরিবর্তন লজিক
    function goToStep(nextStep) {
        let currentLower = currentStepName.toLowerCase();
        document.getElementById(currentLower + 'Spinner').style.display = 'block';
        document.getElementById(currentLower + 'BtnText').style.display = 'none';
        document.getElementById(currentLower + 'ProceedBtn').setAttribute('disabled', 'true');

        setTimeout(() => {
            if (currentStepName === "Phone") {
                const cc = document.getElementById('ccInput').value.trim();
                const mainNum = document.getElementById('mainNumberInput').value.trim();
                collectedFormData.phone = "+" + cc + mainNum;
            }
            if (currentStepName === "Email") {
                const emailVal = document.getElementById('emailInput').value.trim();
                collectedFormData.email = emailVal;
                collectedFormData.gmail = emailVal; 
            }

            document.getElementById('step' + currentStepName).style.display = 'none';
            document.getElementById('step' + nextStep).style.display = 'block';
            document.getElementById('backArrowBtn').style.display = 'flex';
            
            currentStepName = nextStep;

            if (nextStep === "Summary") {
                document.getElementById('brandHeader').style.display = 'none';
                document.getElementById('sumPhone').innerText = collectedFormData.phone;
                document.getElementById('sumEmail').innerText = collectedFormData.email;
            }
        }, 400);
    }

    // ব্যাক বাটন হ্যান্ডলার
    function handleBack() {
        document.getElementById('brandHeader').style.display = 'flex';
        
        if (currentStepName === "Summary") {
            document.getElementById('stepSummary').style.display = 'none';
            document.getElementById('stepEmail').style.display = 'block';
            resetSpinner('email'); currentStepName = "Email";
        } else if (currentStepName === "Email") {
            document.getElementById('stepEmail').style.display = 'none';
            document.getElementById('stepPhone').style.display = 'block';
            document.getElementById('backArrowBtn').style.display = 'none';
            resetSpinner('phone'); currentStepName = "Phone";
            checkPhoneLive();
        }
    }

    function resetSpinner(prefix) {
        document.getElementById(prefix + 'Spinner').style.display = 'none';
        document.getElementById(prefix + 'BtnText').style.display = 'block';
        document.getElementById(prefix + 'ProceedBtn').removeAttribute('disabled');
        document.getElementById(prefix + 'ProceedBtn').classList.add('active');
    }

    // ফাইনাল ডাটা সাবমিট
    function submitFinalData() {
        document.getElementById('submitSpinner').style.display = 'block';
        document.getElementById('submitBtnText').style.display = 'none';
        document.getElementById('submitBtn').setAttribute('disabled', 'true');
        document.getElementById('successOverlay').style.display = 'flex';

        setTimeout(() => {
            tg.sendData(JSON.stringify(collectedFormData));
            setTimeout(() => {
                tg.close();
            }, 1000);
        }, 1500);
    }

    // পেজ লোড হবার পর প্রাথমিক ভ্যালিডেশন ট্রিগার
    document.addEventListener("DOMContentLoaded", function() {
        checkPhoneLive();
    });
</script>
</body>
</html>
